spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${RMS_DB_NAME:restaurantManagementSystem}?currentSchema=${AUTH_DB_SCHEMA:auth}
    username: ${DB_USERNAME:vkaran}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: auth-service-pool
      maximum-pool-size: ${DB_MAX_POOL_SIZE:2}
      minimum-idle: ${DB_MIN_IDLE:0}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: ${AUTH_DB_SCHEMA:auth}
        format_sql: true
        jdbc.time_zone: UTC
app:
  auth:
    default-tenant-id: ${AUTH_DEFAULT_TENANT_ID:bikini-bottom}
    default-property-id: ${AUTH_DEFAULT_PROPERTY_ID:krusty-krab}
    otp-expiry-minutes: ${AUTH_OTP_EXPIRY_MINUTES:10}
    session-token-minutes: ${AUTH_SESSION_TOKEN_MINUTES:480}
    expose-dev-otp: ${AUTH_EXPOSE_DEV_OTP:true}
    seed-admin-username: ${AUTH_SEED_ADMIN_USERNAME:kingChef}
    seed-admin-password: ${AUTH_SEED_ADMIN_PASSWORD:SUPER@secret45}
    seed-admin-email: ${AUTH_SEED_ADMIN_EMAIL:kingchef@restaurant.local}
    seed-admin-phone-country-code: ${AUTH_SEED_ADMIN_PHONE_COUNTRY_CODE:+91}
    seed-admin-phone-number: ${AUTH_SEED_ADMIN_PHONE_NUMBER:9876543210}
  security:
    jwt-secret: ${APP_SECURITY_JWT_SECRET:restaurant-local-development-auth-secret-2026-restaurant-platform}
    jwt-issuer: ${APP_SECURITY_JWT_ISSUER:restaurant-management-system}
    cookie-name: ${APP_SECURITY_COOKIE_NAME:RMS_AUTH_TOKEN}
    permit-all-paths:
      - /error
      - /actuator/health
      - /actuator/info
      - /api/internal/**
      - /api/events
      - /api/auth/login
      - /api/auth/logout
      - /api/auth/password-reset/**
      - /api/auth/password-change
      - /chefy/tenant/*/api/auth/login
      - /chefy/tenant/*/api/auth/logout
      - /chefy/tenant/*/api/auth/password-reset/**
      - /chefy/tenant/*/api/auth/password-change
      - /chefy/tenant/*/property/*/api/auth/login
      - /chefy/tenant/*/property/*/api/auth/logout
      - /chefy/tenant/*/property/*/api/auth/password-reset/**
      - /chefy/tenant/*/property/*/api/auth/password-change
server:
  port: 9001
