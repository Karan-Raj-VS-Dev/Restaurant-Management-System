spring:
  application:
    name: event-gateway-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${RMS_DB_NAME:restaurantManagementSystem}?currentSchema=${EVENT_GATEWAY_DB_SCHEMA:event_gateway}
    username: ${DB_USERNAME:vkaran}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: event-gateway-service-pool
      maximum-pool-size: ${DB_MAX_POOL_SIZE:2}
      minimum-idle: ${DB_MIN_IDLE:0}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: ${EVENT_GATEWAY_DB_SCHEMA:event_gateway}
        format_sql: true
        jdbc.time_zone: UTC
app:
  eventing:
    subscribers: >
      http://localhost:9007/api/internal/events,
      http://localhost:9009/api/internal/events,
      http://localhost:9010/api/internal/events,
      http://localhost:9012/api/internal/events,
      http://localhost:9014/api/internal/events,
      http://localhost:9015/api/internal/events,
      http://localhost:9017/api/internal/events
server:
  port: 9018
