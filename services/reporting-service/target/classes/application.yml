spring:
  application:
    name: reporting-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${RMS_DB_NAME:restaurantManagementSystem}?currentSchema=${REPORTING_DB_SCHEMA:reporting}
    username: ${DB_USERNAME:vkaran}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: reporting-service-pool
      maximum-pool-size: ${DB_MAX_POOL_SIZE:2}
      minimum-idle: ${DB_MIN_IDLE:0}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: ${REPORTING_DB_SCHEMA:reporting}
        format_sql: true
        jdbc.time_zone: UTC
server:
  port: 9016
