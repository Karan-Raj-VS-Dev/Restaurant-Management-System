  <path class="link" d="M 280 815 L 960 560"/>

  <path class="link" d="M 1420 295 L 1210 740"/>
  <path class="link" d="M 1420 295 L 930 740"/>
  <path class="link" d="M 1420 295 L 650 860"/>
  <path class="link" d="M 1420 295 L 930 860"/>
